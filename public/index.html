    <title>Connectify</title>

<body class="join-body">

<header class="landing-header">
    <div class="landing-brand">
        <img src="images/logo.png" alt="Connectify Logo" class="landing-logo">
        <span class="landing-brand-text">Connectify</span>
    </div>

    <div class="landing-nav">
        <button class="nav-btn" onclick="scrollToHome()">Home</button>
        <button class="nav-btn" onclick="scrollToDevelopers()">Contact</button>
    </div>
</header>

<section class="hero-section">
    <div class="hero-overlay"></div>

    <div class="join-container professional-card">
        <div class="brand">
            <img src="images/logo.png" alt="Connectify Logo" class="brand-logo">
            <div class="brand-text-wrap">
                <h1 class="logo-text">Connectify</h1>
                <p class="tagline">Seamless Real-Time Communication</p>
            </div>
        </div>

        <input type="text" id="username" placeholder="Enter Your Name">
        <input type="text" id="room-id" placeholder="Enter Room ID">
        <button onclick="joinRoom()">Join Room</button>
    </div>

    <div class="scroll-indicator" onclick="scrollToDevelopers()">
        <span>Scroll to explore</span>
        <div class="scroll-arrow">⌄</div>
    </div>
</section>

<script>
    function joinRoom() {

        const username = document.getElementById("username").value.trim();
        const roomId = document.getElementById("room-id").value.trim();

        if (!username || !roomId) {
            alert("Please enter your name and room ID");
            return;
        }

        localStorage.setItem("username", username);

        window.location.href = `/meeting.html?room=${roomId}`;
    }

    function scrollToHome(){

        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    }

    function scrollToDevelopers() {

        document.getElementById("developers-section").scrollIntoView({
            behavior: "smooth"
        });
    }
</script>
