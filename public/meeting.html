<!DOCTYPE html>
<html>
<head>
    <title>Connectify Meeting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="meeting-body">

<header class="top-bar">
    <div class="left-header">

        <div class="brand-header">
            <img src="images/logo.png" alt="Connectify Logo" class="header-logo">
            <h2 class="app-title">Connectify</h2>
        </div>

        <span id="room-display"></span>
        <span id="meeting-timer" class="meeting-timer">00:00:00</span>
    </div>

    <div class="right-header">
        <span id="participant-count">Participants: 1</span>
    </div>
</header>

<div class="main-container">

    <div id="video-grid" class="video-grid"></div>

    <div id="chat-panel" class="chat-panel">

        <div class="chat-header">Chat</div>

        <div class="chat-tabs">
            <button id="group-tab-btn" class="chat-tab active" onclick="switchChatTab('group')">Group</button>

            <button id="private-tab-btn" class="chat-tab private-tab-btn" onclick="switchChatTab('private')">
                <span>Private</span>
                <span id="private-notification-badge" class="notification-badge hidden-badge">0</span>
            </button>
        </div>

        <div id="private-chat-controls" class="chat-mode hidden-mode">
            <select id="chat-target">
                <option value="">Select a person</option>
            </select>
        </div>

        <div id="chat-subtitle" class="chat-subtitle">Group Chat</div>

        <div id="messages" class="messages"></div>

        <div class="chat-input">
            <input type="text" id="chat-message" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<div class="controls">
    <button id="mute-btn" class="control-btn icon-btn" onclick="toggleMute()" title="Mute / Unmute">
        <i class="fa-solid fa-microphone"></i>
    </button>

    <button id="camera-btn" class="control-btn icon-btn" onclick="toggleVideo()" title="Camera On / Off">
        <i class="fa-solid fa-video"></i>
    </button>

    <button class="control-btn icon-btn" id="screen-share-btn" onclick="toggleScreenShare()" title="Share Screen">
        <i class="fa-solid fa-desktop"></i>
    </button>

    <button class="control-btn icon-btn" onclick="toggleChat()" title="Open Chat">
        <i class="fa-solid fa-comments"></i>
    </button>

    <button class="control-btn icon-btn" onclick="toggleMirroredPiP()" title="Picture in Picture">
        <i class="fa-solid fa-window-restore"></i>
    </button>

    <button class="control-btn end-call end-call-btn" onclick="endCall()" title="End Call">
        <i class="fa-solid fa-phone-slash"></i>
        <span>End</span>
    </button>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
